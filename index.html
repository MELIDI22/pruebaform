<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prueba – Ubicación y Encuesta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --brand:#e91e63;
      --border:#e5e7eb;
      --btn:#2563eb;
      --success: #059669;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .header{
      background:var(--brand);
      color:#fff;
      padding:16px 20px;
      text-align:center;
      letter-spacing:0.5px;
    }
    .header h1{ margin:0; font-size:clamp(18px,4vw,28px); font-weight:800 }
    .container{ max-width:900px; margin:20px auto; padding:0 12px }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.06);
      padding:16px
    }
    .section{ display:grid; gap:10px; margin-bottom:16px }
    label{ font-weight:600 }
    input, select, textarea, button{
      width:100%;
      padding:12px;
      border:1px solid var(--border);
      border-radius:10px;
      font-size:16px
    }
    button{ background:var(--btn); color:#fff; border:none; cursor:pointer; font-weight: 600; transition: opacity 0.2s; }
    button:disabled{ background:#9ca3af; cursor:not-allowed }
    button:active{ opacity: 0.8; }
    #btnEnviar{ background: var(--success); margin-top: 10px; }
    .hint{ color:var(--muted); font-size:14px }
    #map{ width:100%; height:320px; border-radius:12px; border:1px solid var(--border) }
    .coords{ display:flex; gap:12px; flex-wrap:wrap }
    .coord{ flex:1 1 180px }
    .footer-note{ font-size:12px; color:var(--muted); text-align:center; margin-top:8px }
  </style>
</head>
<body>
  <header class="header">
    <h1>ESTÁS REALMENTE DONDE DIJISTE QUE ESTÁS</h1>
  </header>

  <main class="container">
    <form id="formEncuesta" class="card">
      <div class="section">
        <label>Ubicación por mapa</label>
        <p class="hint">
          Presioná el botón para capturar tu ubicación real.
        </p>
        <div class="coords">
          <div class="coord">
            <label for="lat">Latitud</label>
            <input id="lat" name="latitud" placeholder="--" readonly required />
          </div>
          <div class="coord">
            <label for="lng">Longitud</label>
            <input id="lng" name="longitud" placeholder="--" readonly required />
          </div>
        </div>
        <button id="btnGeo" type="button">📍 Obtener mi ubicación</button>
        <div id="geoStatus" class="hint">Aún no capturada.</div>
        <div id="map"></div>
      </div>

      <div class="section">
        <label for="estado">¿Estás en el sitio?</label>
        <select id="estado" name="ubicacion" required>
          <option value="">Elegí una opción…</option>
          <option value="Si, estoy">si estoy</option>
          <option value="No estoy">no estoy</option>
          <option value="Sorpresa">ahora vas a saber</option>
        </select>
      </div>

      <div class="section">
        <label for="nombre">¿Quién contestó esto?</label>
        <input id="nombre" name="quien_contesto" placeholder="Nombre y apellido" required />
      </div>

      <div class="section">
        <button id="btnEnviar" type="submit">Enviar a Google Sheets</button>
        <div id="out" class="hint" style="text-align: center; margin-top: 10px;"></div>
      </div>

      <p class="footer-note">Los datos se enviarán directamente a tu hoja de cálculo configurada.</p>
    </form>
  </main>

  <script>
    // URL de tu script (ya integrada)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4Pf5x3-rJTJ76d34ZbxRNc21VLZV_hgND1bXtrBw_yWhl2TBVfyoJ0ZxGxYAoaUhung/exec';

    // Inicialización de mapa
    let map = L.map('map', { zoomControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const start = { lat: -25.2637, lng: -57.5759 };
    map.setView(start, 12);
    let marker = L.marker(start).addTo(map);

    // Geolocalización
    const btnGeo = document.getElementById('btnGeo');
    const geoStatus = document.getElementById('geoStatus');
    const latInp = document.getElementById('lat');
    const lngInp = document.getElementById('lng');

    btnGeo.addEventListener('click', () => {
      geoStatus.textContent = 'Obteniendo ubicación…';
      if (!('geolocation' in navigator)) {
        geoStatus.textContent = 'Tu navegador no soporta geolocalización';
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          latInp.value = latitude.toFixed(6);
          lngInp.value = longitude.toFixed(6);
          geoStatus.textContent = `Ubicación capturada (precisión ~${Math.round(accuracy)} m)`;
          const ll = [latitude, longitude];
          map.setView(ll, 17);
          marker.remove();
          marker = L.marker(ll).addTo(map);
        },
        (err) => {
          geoStatus.textContent = 'Error: ' + err.message;
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    });

    // Envío del formulario
    const form = document.getElementById('formEncuesta');
    const btnEnviar = document.getElementById('btnEnviar');
    const out = document.getElementById('out');

    form.addEventListener('submit', e => {
      e.preventDefault();
      
      // Validación simple de coordenadas
      if(!latInp.value || !lngInp.value) {
        alert("Por favor, captura tu ubicación primero.");
        return;
      }

      btnEnviar.disabled = true;
      btnEnviar.textContent = "Enviando...";
      out.textContent = "Procesando envío...";

      // Enviamos los datos usando fetch
      fetch(SCRIPT_URL, { 
        method: 'POST', 
        body: new FormData(form),
        mode: 'no-cors' // Usamos no-cors para evitar problemas de redirección de Google
      })
      .then(() => {
        out.innerHTML = "<b style='color:green;'>¡Datos enviados con éxito!</b>";
        btnEnviar.textContent = "Enviado";
        form.reset();
        geoStatus.textContent = "Enviado correctamente.";
      })
      .catch(error => {
        console.error('Error!', error.message);
        out.innerHTML = "<b style='color:red;'>Error al enviar. Intenta de nuevo.</b>";
        btnEnviar.disabled = false;
        btnEnviar.textContent = "Enviar a Google Sheets";
      });
    });
  </script>
</body>
</html>
